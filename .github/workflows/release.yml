name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Sync Info.plist version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          BUILD_NUM=$(git tag --sort=version:refname | wc -l | tr -d ' ')
          /usr/libexec/PlistBuddy \
            -c "Set :CFBundleShortVersionString $VERSION" \
            -c "Set :CFBundleVersion $BUILD_NUM" \
            ZenmuxMonitor/Info.plist
          echo "App version: $VERSION (build $BUILD_NUM)"

      - name: Build
        run: |
          xcodebuild \
            -project ZenmuxMonitor.xcodeproj \
            -scheme ZenmuxMonitor \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Create DMG
        run: |
          APP_PATH="build/Build/Products/Release/ZenmuxMonitor.app"
          DMG_NAME="ZenMuxMonitor-${GITHUB_REF_NAME}.dmg"
          DMG_STAGING="dmg_staging"

          mkdir -p "$DMG_STAGING"
          cp -R "$APP_PATH" "$DMG_STAGING/"
          ln -s /Applications "$DMG_STAGING/Applications"

          hdiutil create -volname "ZenMux Monitor" \
            -srcfolder "$DMG_STAGING" \
            -ov -format UDZO \
            "$DMG_NAME"

      - name: Generate release notes
        id: notes
        run: |
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREVIOUS_TAG" ]; then
            NOTES=$(git log "${PREVIOUS_TAG}..HEAD" --pretty=format:"- %s" --no-merges)
          else
            NOTES=$(git log --pretty=format:"- %s" --no-merges)
          fi
          {
            echo "content<<EOF"
            echo "## What's Changed"
            echo ""
            echo "$NOTES"
            echo ""
            echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREVIOUS_TAG}...${{ github.ref_name }}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.notes.outputs.content }}
          files: ZenMuxMonitor-${{ github.ref_name }}.dmg
